<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexOS</title>
    <style>
        body {
            background: purple;
            display: flex;
            justify-content: center;
            align-items: left;
            height: 100vh;
        }

        .Cabinet {
            display: flex;
            flex-direction: column;
            align-items: left;
            cursor: pointer;
        }

        .Cabinet img {
            width: 64px; /* Adjust size to mimic an icon */
            height: 64px;
            align-self: left;
        }

        .Cabinet p {
            margin: 5px 0 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 14px;
            text-shadow: 1px 1px black;
            color: white;
        }

        .Cabinet:hover img {
            filter: brightness(1.2);
            transform: scale(1.1);
            transition: transform 0.2s, filter 0.2s;
        }
    </style>
</head>
<body>
   <div class="Cabinet">
     <img src="icons/filecab.png" alt="File Cabinet">
     <p>Files</p>
   </div>
</body>
</html>
